<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珍愛家早午餐 - 後台訂單管理系統</title>
    <style>
        body { font-family: "PingFang TC", sans-serif; background-color: #f1f2f6; margin: 0; padding: 20px; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #edf2f7; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: #2c3e50; margin: 0; font-size: 24px; }
        .refresh-btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .refresh-btn:hover { background: #2980b9; }
        
        .order-card { background: #f8f9fa; border: 1px solid #e1e8ed; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 15px; align-items: start; }
        @media (max-width: 768px) { .order-card { grid-template-columns: 1fr; } }
        
        .info-sec p { margin: 4px 0; font-size: 14px; color: #4a5568; }
        .info-sec strong { color: #2d3748; }
        .items-sec { background: white; padding: 10px; border-radius: 6px; border: 1px solid #edf2f7; white-space: pre-line; font-size: 14px; line-height: 1.4; color: #2c3e50; }
        .status-sec { text-align: right; }
        .price-tag { color: #e74c3c; font-weight: bold; font-size: 20px; display: block; margin-bottom: 10px; }
        .status-badge { display: inline-block; padding: 6px 12px; background: #e67e22; color: white; border-radius: 4px; font-weight: bold; font-size: 12px; }
        #loading { text-align: center; color: #718096; padding: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header">
            <h1>🍳 珍愛家早午餐 — 即時訂單管理後台</h1>
            <button class="refresh-btn" onclick="fetchOrders()">🔄 重新整理訂單</button>
        </div>
        
        <div id="loading">正在連線至 Google 試算表載入訂單...</div>
        <div id="orders-list"></div>
    </div>

    <script>
        // ⚠️ 請在這裡換成與前台相同的 Google Apps Script 部署網址 ⚠️
        const API_URL = "您的_GOOGLE_GAS_部署網址";

        function fetchOrders() {
            const listDiv = document.getElementById('orders-list');
            const loadingDiv = document.getElementById('loading');
            loadingDiv.style.display = 'block';
            
            // 透過 GAS doGet 撈取最新資料
            fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                loadingDiv.style.display = 'none';
                if(data.length === 0) {
                    listDiv.innerHTML = '<p style="text-align:center; color:#a0aec0; padding:4px;">目前尚無任何訂單紀錄喔！</p>';
                    return;
                }
                
                let html = '';
                // 將新訂單排序在最上方
                data.reverse().forEach(order => {
                    html += `
                    <div class="order-card">
                        <div class="info-sec">
                            <p><strong>單號：</strong>${order.id}</p>
                            <p><strong>日期：</strong>${order.date}</p>
                            <p><strong>時間：</strong>${order.time}</p>
                            <p><strong>方式：</strong>${order.type} (填寫: ${order.tableNum})</p>
                            <p><strong>電話：</strong>${order.phone}</p>
                            <p><strong>LINE：</strong>${order.line}</p>
                        </div>
                        <div class="items-sec"><strong>🛒 明細：</strong>\n${order.itemsSummary}\n\n<span style="color:#718096;">📝 備註：${order.note}</span></div>
                        <div class="status-sec">
                            <span class="price-tag">$${order.total}</span>
                            <span class="status-badge">${order.status}</span>
                        </div>
                    </div>`;
                });
                listDiv.innerHTML = html;
            })
            .catch(err => {
                loadingDiv.innerText = '❌ 無法讀取資料，請確認試算表共用權限已開，或 GAS 網址是否正確。';
                console.error(err);
            });
        }

        // 網頁開啟時自動載入
        window.onload = fetchOrders;
    </script>
</body>
</html>
