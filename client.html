        @media (max-width: 600px) { .menu-grid { grid-template-columns: 1fr; } }

        .item-name { font-weight: bold; font-size: 16px; margin-bottom: 8px; color: #333; }

        .opt-btn { background: #f0f0f0; border: 1px solid #ddd; padding: 5px 10px; font-size: 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; }

        .flex-inputs { display: flex; gap: 5px; margin-bottom: 10px; }
